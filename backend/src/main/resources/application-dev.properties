# ============================================================
# PERFIL: DESARROLLO LOCAL
# Este archivo se carga cuando spring.profiles.active=dev
# ============================================================


# ============================================================
# CONFIGURACIÓN DE LA BASE DE DATOS
# Las credenciales se leen del archivo .env (no subir al repo)
# ============================================================

# URL de conexión a MySQL. Formato: jdbc:mysql://host:puerto/nombre_bd
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE}

# Usuario de la base de datos
spring.datasource.username=${MYSQL_USER}

# Contraseña de la base de datos
spring.datasource.password=${MYSQL_PASSWORD}

# Driver JDBC para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ============================================================
# CONFIGURACIÓN JPA / HIBERNATE
# Spring Boot configura Hibernate automáticamente
# usando estas propiedades
# ============================================================

# ddl-auto: cómo gestionar el esquema de la BD al arrancar
#   update   = crea o modifica tablas sin borrar datos (desarrollo)
#   create   = borra y recrea las tablas cada vez (tests)
#   validate = solo comprueba que las tablas coinciden con las entidades (producción)
#   none     = no toca el esquema
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL generadas por Hibernate en la consola
spring.jpa.show-sql=true

# Formatea el SQL mostrado para que sea legible
spring.jpa.properties.hibernate.format_sql=true

# Dialecto: le indica a Hibernate qué variante de SQL generar.
# Con Spring Boot 4.x + Hibernate 6.x se detecta automáticamente,
# por lo que no es necesario especificarlo. Se deja comentado como referencia.
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ============================================================
# CONFIGURACIÓN DEL SERVIDOR WEB
# Spring Boot incluye un servidor Tomcat embebido
# ============================================================

# Puerto en el que escucha la aplicación (por defecto 8080)
server.port=8080


# ============================================================
# CONFIGURACIÓN DE SWAGGER / OPENAPI
# Permite explorar y probar la API desde el navegador
# ============================================================

# Ruta donde se expone la documentación en formato JSON
springdoc.api-docs.path=/api-docs

# Ruta de la interfaz visual de Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
