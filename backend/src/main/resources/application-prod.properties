# ============================================================
# PERFIL: PRODUCCIÓN
# Este archivo se carga cuando spring.profiles.active=prod
# ============================================================


# ============================================================
# CONFIGURACIÓN DE LA BASE DE DATOS
# Las credenciales se leen de variables de entorno del servidor
# ============================================================

# URL de conexión a MySQL.
# Formato para Railway: las variables MYSQLHOST, MYSQLPORT y MYSQLDATABASE las proporciona el plugin de MySQL de Railway.
# Formato para otros entornos (VPS, Docker Compose propio): descomenta la línea de MYSQL_DATABASE y ajusta el host.
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
#spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE}

# Usuario de la base de datos
spring.datasource.username=${MYSQLUSER}
#spring.datasource.username=${MYSQL_USER}

# Contraseña de la base de datos
spring.datasource.password=${MYSQLPASSWORD}
#spring.datasource.password=${MYSQL_PASSWORD}

# Driver JDBC para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ============================================================
# CONFIGURACIÓN JPA / HIBERNATE
# ============================================================

# validate: solo comprueba que las tablas coinciden con las entidades,
# no realiza ningún cambio en el esquema de la base de datos
spring.jpa.hibernate.ddl-auto=validate

# No mostrar SQL en producción para no exponer información sensible
spring.jpa.show-sql=false

# Dialecto detectado automáticamente por Hibernate 6.x (se deja comentado como referencia)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ============================================================
# CONFIGURACIÓN DEL SERVIDOR WEB
# ============================================================

# Puerto en el que escucha la aplicación
server.port=8080


# ============================================================
# CONFIGURACIÓN DE SWAGGER / OPENAPI
# ============================================================

# Swagger deshabilitado en producción para no exponer la documentación interna de la API
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false


# ============================================================
# CONFIGURACIÓN JWT
# ============================================================

# Clave secreta para firmar los tokens JWT. Obligatoria: debe venir de variable de entorno.
# Si no se define JWT_SECRET, la aplicación falla al arrancar (sin fallback intencionadamente).
jwt.secret=${JWT_SECRET}

# Duración del token en milisegundos. Por defecto 24 horas si no se sobreescribe.
jwt.expiration=${JWT_EXPIRATION:86400000}


# ============================================================
# CONFIGURACIÓN CORS
# ============================================================

# Origen del frontend en producción. Obligatorio: debe venir de variable de entorno.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}


# ============================================================
# CONFIGURACIÓN DE ALMACENAMIENTO DE IMÁGENES
# ============================================================

# Carpeta donde se guardan las imágenes subidas por los usuarios.
# En producción se usa una ruta absoluta dentro del contenedor Docker.
# Esta ruta debe coincidir con el volumen definido en compose.yaml cuando se dockerice el backend.
app.uploads.dir=/app/uploads
