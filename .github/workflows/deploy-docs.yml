name: Desplegar Documentación TypeDoc

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # NUEVO: Necesitamos instalar pnpm antes de configurar Node
      - name: Instalar PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 8 # O la versión que uses en tu ordenador

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "frontend/pnpm-lock.yaml" # Le dice dónde buscar el candado

      # MODIFICADO: Añadimos 'working-directory' para que entre a tu carpeta frontend
      - name: Instalar dependencias
        run: pnpm install --no-frozen-lockfile
        working-directory: frontend

      # MODIFICADO: Ejecuta TypeDoc dentro de la carpeta frontend
      - name: Generar documentación con TypeDoc
        run: pnpm run build:docs
        working-directory: frontend

      # El despliegue busca la carpeta 'docs' dentro de 'frontend'
      - name: Desplegar en GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/docs
          branch: gh-pages
