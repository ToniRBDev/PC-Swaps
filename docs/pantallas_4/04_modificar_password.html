<!doctype html>

<html class="dark" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Modificar Contraseña | PC-SWAPS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"

    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#ffc0c4",
              "on-background": "#ffffff",
              "primary-fixed": "#ff7763",
              "surface-container": "#1a191b",
              "surface-container-low": "#131314",
              "surface-container-high": "#201f21",
              "on-primary": "#650000",
              "surface-tint": "#ff8e7d",
              "outline-variant": "#484849",
              "on-primary-container": "#4f0000",
              "on-tertiary-fixed-variant": "#56197d",
              "inverse-on-surface": "#565556",
              "surface-container-highest": "#262627",
              "on-secondary-fixed": "#6a0c22",
              error: "#ff6e84",
              "inverse-primary": "#c10100",
              "surface-variant": "#262627",
              "on-tertiary": "#53157a",
              "surface-bright": "#2c2c2d",
              "tertiary-container": "#d191fa",
              "secondary-fixed": "#ffc2c6",
              "on-error-container": "#ffb2b9",
              "primary-fixed-dim": "#ff5b47",
              secondary: "#fe7e8c",
              "inverse-surface": "#fcf8f9",
              "on-error": "#490013",
              background: "#0e0e0f",
              outline: "#767576",
              "secondary-fixed-dim": "#ffaeb4",
              "on-primary-fixed": "#000000",
              primary: "#ff8e7d",
              "error-dim": "#d73357",
              "surface-dim": "#0e0e0f",
              surface: "#0e0e0f",
              "on-surface": "#ffffff",
              "secondary-dim": "#f47785",
              "on-secondary": "#570017",
              "error-container": "#a70138",
              tertiary: "#dba2ff",
              "tertiary-dim": "#c384eb",
              "primary-container": "#ff7763",
              "on-surface-variant": "#adaaab",
              "primary-dim": "#eb0000",
              "surface-container-lowest": "#000000",
              "secondary-container": "#842133",
              "tertiary-fixed-dim": "#c889f1",
              "on-tertiary-container": "#47026f",
              "on-secondary-fixed-variant": "#912b3c",
              "tertiary-fixed": "#d697ff",
              "on-tertiary-fixed": "#2a0044",
              "on-primary-fixed-variant": "#600000",
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Space Grotesk"],
              display: ["Space Grotesk"],
              body: ["Inter"],
              label: ["Space Grotesk"],
            },
          },
        },
      };

    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      h1,
      h2,
      h3,
      .nav-link,
      .brand-logo,
      button,
      label {
        font-family: "Space Grotesk", sans-serif;
      }
    </style>
  </head>
  <body class="bg-background text-on-background min-h-screen flex flex-col">
    <!-- Main Content: Password Modification Form -->
    <main class="flex-grow flex items-center justify-center p-6 md:p-12">
      <div class="max-w-xl w-full relative">
        <!-- Decorative Accent Bar -->
        <div
          class="absolute -left-4 top-0 bottom-0 w-1 bg-primary-dim opacity-50"
        ></div>
        <section
          class="bg-surface-container-high p-8 md:p-12 shadow-none border-none"
        >
          <!-- Section Title -->
          <header class="mb-10">
            <h1
              class="text-4xl md:text-5xl font-black tracking-tighter text-on-background uppercase italic mb-2"
            >
              MODIFICAR <span class="text-primary-dim">CONTRASEÑA</span>
            </h1>
            <p class="text-on-surface-variant text-sm font-body tracking-wide">
              Asegura tu cuenta con una clave de alta complejidad.
            </p>
          </header>
          <form class="space-y-8" onsubmit="return false;">
            <!-- Input: Contraseña actual -->
            <div class="relative group">
              <label
                class="block text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-1 group-focus-within:text-primary-dim transition-colors"
                for="current_password"
              >
                Contraseña actual
              </label>
              <input
                class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant py-3 px-0 text-on-background focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all placeholder:text-zinc-700"
                id="current_password"
                placeholder="••••••••••••"
                type="password"
              />
            </div>
            <!-- Input: Nueva contraseña -->
            <div class="relative group">
              <label
                class="block text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-1 group-focus-within:text-primary-dim transition-colors"
                for="new_password"
              >
                Nueva contraseña
              </label>
              <input
                class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant py-3 px-0 text-on-background focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all placeholder:text-zinc-700"
                id="new_password"
                placeholder="••••••••••••"
                type="password"
              />
            </div>
            <!-- Input: Confirmar nueva contraseña -->
            <div class="relative group">
              <label
                class="block text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-1 group-focus-within:text-primary-dim transition-colors"
                for="confirm_password"
              >
                Confirmar nueva contraseña
              </label>
              <input
                class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant py-3 px-0 text-on-background focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all placeholder:text-zinc-700"
                id="confirm_password"
                placeholder="••••••••••••"
                type="password"
              />
            </div>
            <!-- Form Actions -->
            <div class="pt-6 flex flex-col sm:flex-row gap-4">
              <!-- Button: GUARDAR CAMBIOS -->
              <button
                class="flex-1 bg-gradient-to-br from-primary-dim to-primary-container text-on-primary-fixed font-black uppercase tracking-widest text-sm py-4 px-8 hover:shadow-[0_0_20px_rgba(235,0,0,0.3)] transition-all active:scale-95"
              >
                GUARDAR CAMBIOS
              </button>
              <!-- Button: DESCARTAR -->
              <button
                class="flex-1 border border-primary-dim/40 text-primary-dim font-black uppercase tracking-widest text-sm py-4 px-8 hover:bg-primary-dim/5 transition-all active:scale-95"
              >
                DESCARTAR
              </button>
            </div>
          </form>
        </section>
        <!-- Decorative Elements -->
        <div class="mt-8 grid grid-cols-3 gap-2 opacity-20">
          <div class="h-1 bg-primary-dim"></div>
          <div class="h-1 bg-zinc-800"></div>
          <div class="h-1 bg-zinc-800"></div>
        </div>
      </div>
    </main>
    <!-- Footer Component -->
    <footer
      class="flex flex-col md:flex-row justify-between items-center px-10 py-12 w-full bg-[#0e0e0f] dark:bg-[#000000] border-t border-white/5"
    >
      <div class="text-lg font-bold text-white brand-logo mb-6 md:mb-0">
        PC-SWAPS
      </div>
      <div class="flex flex-col md:flex-row items-center gap-8">
        <a
          class="font-['Space_Grotesk'] text-[10px] uppercase tracking-[0.2em] text-zinc-600 hover:text-[#eb0000] underline decoration-2 underline-offset-4 opacity-70 hover:opacity-100 transition-all"
          href="#"
        >
          Soporte
        </a>
        <span
          class="font-['Space_Grotesk'] text-[10px] uppercase tracking-[0.2em] text-zinc-600"
        >
          © 2024 PC-SWAPS
        </span>
      </div>
    </footer>
  </body>
</html>
