    <link

      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: #0e0e0f;
      }
      .font-space-grotesk {
        font-family: "Space Grotesk", sans-serif;
      }
      .neon-glow {
        box-shadow: 0 0 30px rgba(235, 0, 0, 0.15);
      }
      .primary-gradient {
        background: linear-gradient(135deg, #eb0000 0%, #ff7763 100%);
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#ff7763",
              "surface-dim": "#0e0e0f",
              "on-surface": "#ffffff",
              "on-primary-fixed-variant": "#600000",
              "surface-container": "#1a191b",
              "surface-container-lowest": "#000000",
              "secondary-fixed": "#ffc2c6",
              "secondary-dim": "#f47785",
              "secondary-container": "#842133",
              "on-secondary": "#570017",
              tertiary: "#dba2ff",
              "on-surface-variant": "#adaaab",
              "on-secondary-container": "#ffc0c4",
              "secondary-fixed-dim": "#ffaeb4",
              "error-container": "#a70138",
              "on-secondary-fixed-variant": "#912b3c",
              "tertiary-dim": "#c384eb",
              "surface-container-low": "#131314",
              "on-background": "#ffffff",
              "on-tertiary-fixed": "#2a0044",
              "primary-fixed-dim": "#ff5b47",
              "inverse-surface": "#fcf8f9",
              error: "#ff6e84",
              "tertiary-container": "#d191fa",
              surface: "#0e0e0f",
              "surface-tint": "#ff8e7d",
              "primary-dim": "#eb0000",
              "surface-container-high": "#201f21",
              "error-dim": "#d73357",
              "on-primary-fixed": "#000000",
              "on-tertiary-container": "#47026f",
              "surface-bright": "#2c2c2d",
              "on-primary-container": "#4f0000",
              "tertiary-fixed-dim": "#c889f1",
              "primary-container": "#ff7763",
              "outline-variant": "#484849",
              "inverse-primary": "#c10100",
              "on-secondary-fixed": "#6a0c22",
              "on-error-container": "#ffb2b9",
              "on-tertiary-fixed-variant": "#56197d",
              background: "#0e0e0f",
              secondary: "#fe7e8c",
              "inverse-on-surface": "#565556",
              "on-primary": "#650000",
              "on-tertiary": "#53157a",
              "on-error": "#490013",
              outline: "#767576",
              "surface-variant": "#262627",
              primary: "#ff8e7d",

            borderRadius: {

              full: "9999px",
            },

              headline: ["Space Grotesk"],

            },
          },
        },
      };

  </head>
  <body class="bg-surface-dim text-on-surface overflow-hidden">
      <!-- Fondo de la página -->
    <div class="fixed inset-0 z-0 overflow-hidden">
      <div
        class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&amp;w=2070&amp;auto=format&amp;fit=crop')] bg-cover bg-center opacity-30 grayscale brightness-50"
        data-alt="dramatic wide shot of a futuristic neon gaming arena with red ambient lighting and smoke effects in high-tech architectural setting"
      ></div>
      <div
        class="absolute inset-0 bg-gradient-to-t from-surface-dim via-transparent to-surface-dim"
      ></div>
      <div
        class="absolute inset-0 bg-gradient-to-r from-surface-dim via-transparent to-surface-dim"
      ></div>
      <!-- LINEAS DECORATIVAS -->
      <div class="absolute top-0 left-0 w-full h-1 bg-primary-dim/20"></div>
      <div class="absolute bottom-0 left-0 w-full h-1 bg-primary-dim/20"></div>
    </div>
    <!-- Contenido principal -->
    <main
      class="relative z-10 min-h-screen flex items-center justify-center p-6"
    >
      <!-- Módulo de inicio de sesión -->
      <div
        class="w-full max-w-md bg-surface-container-high/90 backdrop-blur-xl rounded-none relative overflow-hidden border-l border-primary-dim/30"
      >
        <div class="absolute top-0 left-0 w-1 h-full bg-primary-dim"></div>
        <!-- Encabezado del panel -->
        <div class="px-8 pt-10 pb-6">
          <div class="flex flex-col items-start gap-1">
            <span
              class="font-headline text-primary-dim text-sm tracking-[0.2em] uppercase font-bold"
              >Sistema.Inicio_Sesion</span
            >
            <h1
              class="font-headline text-5xl font-black italic tracking-tighter text-on-surface uppercase leading-none"
            >
              PC-SWAPS
            </h1>
          </div>
        </div>
        <!-- Contenedor del formulario -->
        <div class="px-8 pb-12">
          <form class="space-y-8">
            <!-- Email -->
            <div class="space-y-2">
              <label
                class="font-headline text-[10px] text-outline uppercase tracking-widest block"
                >Email o nombre de usuario</label
              >
              <div class="relative group">
                <input
                  class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant focus:border-primary-dim focus:ring-0 transition-all px-0 py-3 text-sm font-body uppercase placeholder:text-outline/40"
                  placeholder="EMAIL@PROTOCOL.COM"
                  type="email"
                />
                <span
                  class="material-symbols-outlined absolute right-2 top-3 text-outline group-focus-within:text-primary-dim transition-colors"
                  >alternate_email</span
                >
              </div>
            </div>
            <!-- Contraseña Field -->
            <div class="space-y-2">
              <label
                class="font-headline text-[10px] text-outline uppercase tracking-widest block"
                >Contraseña</label
              >
              <div class="relative group">
                <input
                  class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant focus:border-primary-dim focus:ring-0 transition-all px-0 py-3 text-sm font-body placeholder:text-outline/40"
                  placeholder="••••••••"
                  type="password"
                />
                <span
                  class="material-symbols-outlined absolute right-2 top-3 text-outline group-focus-within:text-primary-dim transition-colors"
                  >lock</span
                >
              </div>
            </div>
            <!-- Botones de acción -->
            <div class="pt-4 space-y-6">
              <button
                class="w-full primary-gradient text-on-primary-fixed font-headline font-black uppercase tracking-[0.15em] py-4 text-sm neon-glow active:scale-95 transition-all flex items-center justify-center gap-2 group"
                type="submit"
              >
                Iniciar sesión
                <span
                  class="material-symbols-outlined group-hover:translate-x-1 transition-transform"
                  >arrow_forward</span
                >
              </button>
              <div class="flex items-center gap-4">
                <div class="h-px flex-1 bg-outline-variant"></div>
                <span class="font-headline text-[10px] text-outline uppercase"
                  >Estado de conexión</span
                >
                <div class="h-px flex-1 bg-outline-variant"></div>
              </div>
              <!-- Secondary Actions -->
              <div class="space-y-4">
                <p
                  class="font-body text-xs text-on-surface-variant text-center"
                >
                  ¿Aún no tienes cuenta?
                </p>
                <!-- Botón para crear cuenta -->
                <button
                  class="w-full border border-primary-dim/40 text-primary-dim font-headline font-bold uppercase tracking-[0.15em] py-4 text-xs hover:bg-primary-dim/10 transition-colors"
                  type="button"
                >
                  Crear cuenta
                </button>
              </div>
            </div>
          </form>
        </div>
        <!-- Barra inferior del login -->
        <div
          class="bg-surface-container-lowest px-8 py-3 flex justify-between items-center border-t border-outline-variant/30"
        >
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-primary-dim animate-pulse"></div>
            <span class="font-headline text-[9px] text-outline uppercase"
              >Nodo seguro: activo</span
            >
          </div>
          <span class="font-headline text-[9px] text-outline uppercase"
            >v2.0.26-PCSWAPS</span
          >
        </div>
      </div>
      <!-- Elementos decorativos -->
      <div
        class="absolute top-20 right-20 w-48 h-48 border-t-2 border-r-2 border-primary-dim/10 hidden lg:block"
      ></div>
      <div
        class="absolute bottom-20 left-20 w-32 h-32 border-b-2 border-l-2 border-primary-dim/10 hidden lg:block"
      ></div>
      <!-- Texto decorativo lateral -->
      <div class="absolute bottom-10 right-10 hidden md:block">
        <p
          class="font-headline text-[10px] text-primary-dim/40 vertical-text uppercase tracking-[0.5em] rotate-180"
          style="writing-mode: vertical-rl"
        >
          PC-SWAPS_SYSTEMS_AUTHENTICATION_PROTOCOL_88.1
        </p>
      </div>
    </main>
    <!-- Global Footer (Matches JSON schema logic) -->
    <footer
      class="fixed bottom-0 left-0 w-full z-20 flex flex-col md:flex-row justify-between items-center px-8 py-6 bg-transparent"
    >
      <div class="font-body text-[10px] tracking-tight text-outline uppercase">
        ©2026 PC-SWAPS INICIO. ALL RIGHTS RESERVED.
      </div>
      <!-- Enlaces del pie de página -->
      <nav class="flex gap-6 mt-4 md:mt-0">

        <a

        <a
          class="font-headline text-[10px] tracking-tight text-outline hover:text-on-surface transition-colors uppercase"
          href="#"
          >Soporte</a
        >
      </nav>
    </footer>
  </body>
</html>
