<!doctype html>

<html class="dark" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PC-SWAPS | Creación de Cuenta</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: #0e0e0f;
      }
      .font-headline {
        font-family: "Space Grotesk", sans-serif;
      }
      .font-label {
        font-family: "Space Grotesk", sans-serif;
      }

      /* Custom Red/Black Strike Background Effect */
      .bg-strike {
        background:
          linear-gradient(
            135deg,
            rgba(0, 0, 0, 1) 0%,
            rgba(0, 0, 0, 0.8) 50%,
            rgba(235, 0, 0, 0.05) 100%
          ),
          repeating-linear-gradient(
            45deg,
            transparent,
            transparent 100px,
            rgba(235, 0, 0, 0.03) 101px,
            rgba(235, 0, 0, 0.03) 102px
          );
      }

      /* Glass/Glow Rules from DS */
      .glass-panel {
        background-color: rgba(44, 44, 45, 0.8);
        backdrop-filter: blur(20px);
      }

      .neon-bleed {
        box-shadow: 0 0 30px 0 rgba(235, 0, 0, 0.15);
      }

      .cta-gradient {
        background: linear-gradient(135deg, #eb0000 0%, #ff7763 100%);
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#ff7763",
              "surface-dim": "#0e0e0f",
              "on-surface": "#ffffff",
              "on-primary-fixed-variant": "#600000",
              "surface-container": "#1a191b",
              "surface-container-lowest": "#000000",
              "secondary-fixed": "#ffc2c6",
              "secondary-dim": "#f47785",
              "secondary-container": "#842133",
              "on-secondary": "#570017",
              tertiary: "#dba2ff",
              "on-surface-variant": "#adaaab",
              "on-secondary-container": "#ffc0c4",
              "secondary-fixed-dim": "#ffaeb4",
              "error-container": "#a70138",
              "on-secondary-fixed-variant": "#912b3c",
              "tertiary-dim": "#c384eb",
              "surface-container-low": "#131314",
              "on-background": "#ffffff",
              "on-tertiary-fixed": "#2a0044",
              "primary-fixed-dim": "#ff5b47",
              "inverse-surface": "#fcf8f9",
              error: "#ff6e84",
              "tertiary-container": "#d191fa",
              surface: "#0e0e0f",
              "surface-tint": "#ff8e7d",
              "primary-dim": "#eb0000",
              "surface-container-high": "#201f21",
              "error-dim": "#d73357",
              "on-primary-fixed": "#000000",
              "on-tertiary-container": "#47026f",
              "surface-bright": "#2c2c2d",
              "on-primary-container": "#4f0000",
              "tertiary-fixed-dim": "#c889f1",
              "primary-container": "#ff7763",
              "outline-variant": "#484849",
              "inverse-primary": "#c10100",
              "on-secondary-fixed": "#6a0c22",
              "on-error-container": "#ffb2b9",
              "on-tertiary-fixed-variant": "#56197d",
              background: "#0e0e0f",
              secondary: "#fe7e8c",
              "inverse-on-surface": "#565556",
              "on-primary": "#650000",
              "on-tertiary": "#53157a",
              "on-error": "#490013",
              outline: "#767576",
              "surface-variant": "#262627",
              primary: "#ff8e7d",
              "tertiary-fixed": "#d697ff",
              "surface-container-highest": "#262627",
            },
            borderRadius: {
              DEFAULT: "0px",
              lg: "0px",
              xl: "0px",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Space Grotesk"],
              body: ["Inter"],
              label: ["Space Grotesk"],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-surface-dim text-on-surface selection:bg-primary-dim selection:text-white min-h-screen flex flex-col"
  >
    <!-- Encabezado con Logo -->
    <header
      class="bg-zinc-950/90 backdrop-blur-xl border-b border-zinc-800/50 shadow-[0_4px_30px_rgba(235,0,0,0.1)] flex justify-center md:justify-start items-center w-full px-6 py-4 max-w-none"
    >
      <div
        class="text-3xl font-black italic tracking-tighter text-on-surface uppercase font-headline"
      >
        PC-SWAPS
      </div>
    </header>
    <main
      class="flex-grow relative flex items-center justify-center p-6 bg-strike overflow-hidden"
    >
      <!-- Efectos Visuales de Fondo -->
      <div class="absolute inset-0 pointer-events-none opacity-20">
        <div
          class="absolute top-0 left-1/4 w-px h-full bg-primary-dim transform -skew-x-12"
        ></div>
        <div
          class="absolute top-0 right-1/4 w-2 h-full bg-primary-dim transform -skew-x-12 blur-sm"
        ></div>
        <div
          class="absolute top-1/2 left-0 w-full h-px bg-primary-dim transform skew-y-3"
        ></div>
      </div>
      <!-- Tarjeta Central de Creación -->
      <div class="w-full max-w-2xl relative z-10">
        <!-- Notificación de Éxito -->
        <div
          class="mb-6 flex items-center bg-surface-container-highest border-l-4 border-tertiary p-4 animate-pulse"
        >
          <span
            class="material-symbols-outlined text-tertiary mr-3"
            data-weight="fill"
            >check_circle</span
          >
          <p
            class="font-label text-sm uppercase tracking-widest font-bold text-on-surface"
          >
            ¡Cuenta creada correctamente!
          </p>
        </div>
        <div
          class="glass-panel border border-outline-variant/15 p-8 md:p-12 neon-bleed"
        >
          <!-- Título -->
          <div class="mb-10 text-left">
            <h1
              class="font-headline text-5xl font-black uppercase tracking-tighter text-on-surface mb-2 leading-none"
            >
              ÚNETE A <span class="text-primary-dim italic">PC-SWAPS</span>
            </h1>
            <p
              class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-bold"
            >
              Asegura tu identidad operativa en el sector de élite.
            </p>
          </div>
          <form class="space-y-8">

            <!-- Cuadrícula de Inputs -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-10">
              <!-- Input de Nombre -->
              <div class="relative">
                <input
                  class="block w-full px-0 py-2 bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all peer font-body"
                  id="nombre"
                  placeholder=" "
                  type="text"
                />
                <label
                  class="absolute font-label text-xs uppercase font-black tracking-widest text-on-surface-variant top-0 -translate-y-6 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 peer-focus:text-primary-dim transition-all"
                  for="nombre"
                  >Nombre</label
                >
              </div>
                            <div class="relative">
                <input
                  class="block w-full px-0 py-2 bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all peer font-body"
                  id="dni"
                  placeholder=" "
                  type="text"
                />
                <label
                  class="absolute font-label text-xs uppercase font-black tracking-widest text-on-surface-variant top-0 -translate-y-6 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 peer-focus:text-primary-dim transition-all"
                  for="dni"
                  >DNI</label
                >
              </div>

              </div>
              <!-- Input de Apellido -->
              <div class="relative">
                <input
                  class="block w-full px-0 py-2 bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all peer font-body"
                  id="apellidos"
                  placeholder=" "
                  type="text"
                />
                <label
                  class="absolute font-label text-xs uppercase font-black tracking-widest text-on-surface-variant top-0 -translate-y-6 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 peer-focus:text-primary-dim transition-all"
                  for="apellidos"
                  >Apellidos</label
                >
              </div>
              <!-- Input de Teléfono -->
              <div class="relative">
                <input
                  class="block w-full px-0 py-2 bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all peer font-body"
                  id="telefono"
                  placeholder=" "
                  type="tel"
                />
                <label
                  class="absolute font-label text-xs uppercase font-black tracking-widest text-on-surface-variant top-0 -translate-y-6 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 peer-focus:text-primary-dim transition-all"
                  for="telefono"
                  >Número de Teléfono</label
                >
              </div>
                            <!-- Input de Dirección -->
              <div class="relative md:col-span-2">
                <input
                  class="block w-full px-0 py-2 bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all peer font-body"
                  id="direccion"
                  placeholder=" "
                  type="text"
                />
                <label
                  class="absolute font-label text-xs uppercase font-black tracking-widest text-on-surface-variant top-0 -translate-y-6 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 peer-focus:text-primary-dim transition-all"
                  for="direccion"
                  >Dirección</label
                >
              </div>
                            <div class="relative">
                <input
                  class="block w-full px-0 py-2 bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all peer font-body"
                  id="fechaNacimiento"
                  placeholder=" "
                  type="text"
                />
                <label
                  class="absolute font-label text-xs uppercase font-black tracking-widest text-on-surface-variant top-0 -translate-y-6 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 peer-focus:text-primary-dim transition-all"
                  for="fechaNacimiento"
                  >Fecha de nacimiento</label
                >
              </div>

              <!-- Input de Email -->
              <div class="relative">
                <input
                  class="block w-full px-0 py-2 bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all peer font-body"
                  id="correoElectronico"
                  placeholder=" "
                  type="email"
                />
                <label
                  class="absolute font-label text-xs uppercase font-black tracking-widest text-on-surface-variant top-0 -translate-y-6 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 peer-focus:text-primary-dim transition-all"
                  for="correoElectronico"
                  >Email</label
                >
              </div>
                            <!-- Input de Nombre de usuario -->
              <div class="relative">
                <input
                  class="block w-full px-0 py-2 bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all peer font-body"
                  id="nombreUsuario"
                  placeholder=" "
                  type="text"
                />
                <label
                  class="absolute font-label text-xs uppercase font-black tracking-widest text-on-surface-variant top-0 -translate-y-6 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 peer-focus:text-primary-dim transition-all"
                  for="nombreUsuario"
                  >Nombre de usuario</label
                >
              </div>


              <!-- Input de Contraseña -->
              <div class="relative">
                <input
                  class="block w-full px-0 py-2 bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all peer font-body"
                  id="contrasena"
                  placeholder=" "
                  type="password"
                />
                <label
                  class="absolute font-label text-xs uppercase font-black tracking-widest text-on-surface-variant top-0 -translate-y-6 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 peer-focus:text-primary-dim transition-all"
                  for="contrasena"
                  >Contraseña</label
                >
              </div>
              <!-- Input de Repetir Contraseña -->
              <div class="relative">
                <input
                  class="block w-full px-0 py-2 bg-transparent border-0 border-b-2 border-outline-variant text-on-surface focus:ring-0 focus:border-primary-dim focus:bg-surface-container-low transition-all peer font-body"
                  id="repetirContrasena"
                  placeholder=" "
                  type="password"
                />
                <label
                  class="absolute font-label text-xs uppercase font-black tracking-widest text-on-surface-variant top-0 -translate-y-6 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 peer-focus:text-primary-dim transition-all"
                  for="repetirContrasena"
                  >Repetir Contraseña</label
                >
              </div>
            </div>
            <!-- Botón de Registro -->
            <div class="pt-10">
              <button
                class="cta-gradient w-full py-4 text-on-primary-fixed font-headline font-black uppercase tracking-[0.2em] text-lg hover:shadow-[0_0_20px_rgba(235,0,0,0.4)] active:scale-95 transition-all flex items-center justify-center gap-3"
                type="submit"
              >
                <span>Crear cuenta</span>
                <span class="material-symbols-outlined">rocket_launch</span>
              </button>
              <p
                class="mt-6 text-center text-xs font-body text-on-surface-variant uppercase tracking-tighter"
              >
                ¿Ya eres miembro de la élite?
                <a class="text-primary-dim hover:underline font-bold" href="#"
                  >Iniciar sesión</a
                >
              </p>
            </div>
          </form>
        </div>
      </div>
    </main>
    <!-- Pie de Página Simplificado -->
    <footer
      class="bg-black border-t-4 border-red-600/20 w-full py-12 px-8 flex flex-col md:flex-row justify-between items-center gap-6"
    >
      <div
        class="text-lg font-black text-zinc-200 font-headline uppercase tracking-tight"
      >
        PC-SWAPS
      </div>
      <div class="flex gap-8">
        <a
          class="font-inter text-xs tracking-tight text-zinc-600 hover:text-zinc-100 underline decoration-red-600 cursor-pointer uppercase"
          href="#"
          >Soporte</a
        >
      </div>
      <div
        class="font-inter text-xs tracking-tight text-zinc-500 uppercase opacity-80"
      >
        ©2024 SISTEMA KINETIC PC-SWAPS. TODOS LOS DERECHOS RESERVADOS.
      </div>
    </footer>
  </body>
</html>
